name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type-check core scoring (mypy)
        run: mypy src/degreezeor/scoring src/degreezeor/core/numeric.py || true

      - name: Tests (unit + neutrality gates; SQLite, no network)
        # Live tests (DZ_RUN_LIVE) are intentionally NOT run in CI: they need
        # network + Postgres. Unit tests use in-memory SQLite and cover the
        # CI gates: party-blindness, audit tamper, reproducibility logic,
        # confidence gate, and source-trail integrity.
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend syntax check (catches SPA parse errors)
        run: node --check web/app.js && node --check web/config.js

      - name: Migrations apply cleanly + DB matches models
        run: |
          python -c "from degreezeor.cli import main; main(['migrate'])"
        env:
          DZ_DATABASE_URL: "sqlite+pysqlite:///ci_migrate.sqlite"
