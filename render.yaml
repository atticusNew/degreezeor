# Render Blueprint — production deployment.
#
# Architecture: ingestion/scoring (slow, batch) is decoupled from serving (fast, read-only).
#   - Postgres            : system of record + precomputed scores
#   - API web service     : read-only FastAPI; serves precomputed scores in milliseconds
#   - Static site         : the zero-build SPA (web/), points at the API
#   - Cron job            : nightly idempotent ingestion/scoring (off the request path)
#
# Set the API keys (DZ_CONGRESS_API_KEY, DZ_BLS_API_KEY, DZ_CENSUS_API_KEY, DZ_EIA_API_KEY,
# optional DZ_COURTLISTENER_TOKEN / DZ_FBI_API_KEY) as secret env vars in the Render dashboard
# (sync: false) on BOTH the web service and the cron — never commit them.

databases:
  - name: degreezeor-db
    # Render's new "flexible" Postgres plans (legacy 'starter'/'standard'/'pro' are no
    # longer allowed for new DBs). 'free' = 1 GB, expires after 30 days (good for a trial);
    # switch to 'basic-256mb' (default) or 'basic-1gb' for a durable production database.
    plan: free
    postgresMajorVersion: "16"

services:
  # ---- Read-only API ----
  - type: web
    name: degreezeor-api
    runtime: python
    plan: starter
    buildCommand: "pip install -e ."
    preDeployCommand: "degreezeor migrate"          # apply migrations before each deploy
    startCommand: "uvicorn degreezeor.api.app:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    disk:
      name: data
      mountPath: /var/data                          # durable cache/landing
      sizeGB: 1
    envVars:
      - key: DZ_DATABASE_URL
        fromDatabase: { name: degreezeor-db, property: connectionString }
      - key: DZ_DATA_DIR
        value: /var/data
      - key: DZ_HTTP_CACHE
        value: "1"
      - key: DZ_CONGRESS_API_KEY
        sync: false
      - key: DZ_BLS_API_KEY
        sync: false
      - key: DZ_COURTLISTENER_TOKEN
        sync: false
      - key: DZ_CENSUS_API_KEY
        sync: false
      - key: DZ_EIA_API_KEY
        sync: false
      - key: DZ_FBI_API_KEY
        sync: false
      - key: DZ_METRICS_TOKEN  # gate for /api/metrics (web service only)
        sync: false

  # NOTE: The SPA is served by the API web service itself (FastAPI mounts web/ at "/"),
  # so the UI and /api share one origin and config.js can stay empty (same-origin). This
  # avoids a separate static site whose API base must be injected from the API host — Render's
  # `fromService.host` yields the INTERNAL service name (e.g. "degreezeor-api"), not the public
  # "*.onrender.com" host, which produced ERR_NAME_NOT_RESOLVED. Single-service = one URL that
  # serves both the UI and the API. (To split later, host the static site and hardcode its
  # DZ_API_BASE to the API's public https URL.)

  # ---- Nightly ingestion + scoring (cron) ----
  - type: cron
    name: degreezeor-ingest
    runtime: python
    schedule: "0 7 * * *"                            # 07:00 UTC daily
    buildCommand: "pip install -e ."
    startCommand: "degreezeor migrate && degreezeor refresh"
    # NOTE: Render cron jobs do NOT support persistent disks. The cron job's
    # cache/landing is therefore ephemeral (cold start each run) — that is fine
    # because Postgres is the durable system of record; the disk only ever held
    # replayable HTTP cache / raw landing files. DZ_DATA_DIR points at the
    # container's writable /tmp so ingestion has scratch space.
    envVars:
      - key: DZ_DATABASE_URL
        fromDatabase: { name: degreezeor-db, property: connectionString }
      - key: DZ_DATA_DIR
        value: /tmp/data
      - key: DZ_CONGRESS_API_KEY
        sync: false
      - key: DZ_BLS_API_KEY
        sync: false
      - key: DZ_COURTLISTENER_TOKEN
        sync: false
      - key: DZ_CENSUS_API_KEY
        sync: false
      - key: DZ_EIA_API_KEY
        sync: false
      - key: DZ_FBI_API_KEY
        sync: false
